<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanlate Tracker — Архів</title>
    <link rel="icon" href="assets/images/branding/Logo.svg" type="image/svg+xml">
    <script src="assets/js/shared/theme.js"></script>
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/main-tasks.css">
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .archive-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
        .archive-toolbar h3{margin:0;}
        .archive-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
        .export-group{display:flex;align-items:center;gap:8px;background:#fdfaf7;border:1.5px solid rgba(72,40,19,0.12);border-radius:12px;padding:6px 10px;}
        .export-group select{border:none;background:transparent;font-size:13px;font-weight:700;color:var(--main-brown);outline:none;cursor:pointer;max-width:160px;font-family:inherit;}
        .btn-export{background:#27ae60;color:#fff;border:none;border-radius:9px;padding:8px 16px;font-weight:900;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;}
        .btn-export:hover{opacity:0.85;}
        .btn-delete-selected{background:#ff5c5c;color:#fff;border:none;padding:9px 16px;border-radius:10px;font-weight:900;cursor:pointer;font-size:13px;display:none;align-items:center;gap:6px;font-family:inherit;}
        .btn-delete-selected:hover{background:#e04040;}
        .archive-count{font-size:12px;font-weight:800;color:#b1a191;}
        .row-select{width:16px;height:16px;cursor:pointer;accent-color:#ff5c5c;}
        tr.selected-row{background:#fff5f5;}
        .empty-archive{text-align:center;padding:60px 20px;color:#b1a191;}
        .empty-archive i{font-size:40px;margin-bottom:15px;opacity:0.4;display:block;}
        .empty-archive p{font-weight:700;font-size:15px;}
        .row-actions{display:flex;gap:8px;justify-content:center;align-items:center;}
        .btn-row-restore,.btn-row-delete{border:none;width:34px;height:34px;border-radius:11px;cursor:pointer;transition:0.2s;display:flex;align-items:center;justify-content:center;font-size:13px;}
        .btn-row-restore{background:#e9f8ef;color:#27ae60;box-shadow:inset 0 1px 0 rgba(255,255,255,0.55);}
        .btn-row-restore:hover{background:#d8f3e2;transform:translateY(-1px);}
        .btn-row-delete{background:#fff0f0;color:#ff5c5c;box-shadow:inset 0 1px 0 rgba(255,255,255,0.55);}
        .btn-row-delete:hover{background:#ffe2e2;transform:translateY(-1px);}
        #archive-list td:last-child{overflow:visible;max-width:none;}

        html[data-theme]:not([data-theme="coffee"]) .status-badge.paid{background:rgba(39,174,96,0.18);color:#33d17a;}
        html[data-theme]:not([data-theme="coffee"]) .status-badge.unpaid{background:rgba(195,7,63,0.18);color:#ff6b8d;}
        html[data-theme]:not([data-theme="coffee"]) .row-actions{gap:10px;}
        html[data-theme]:not([data-theme="coffee"]) .btn-row-restore,
        html[data-theme]:not([data-theme="coffee"]) .btn-row-delete{
            border:none;
            box-shadow:none;
        }
        html[data-theme]:not([data-theme="coffee"]) .btn-row-restore{
            background:rgba(39,174,96,0.12);
            color:#33d17a;
        }
        html[data-theme]:not([data-theme="coffee"]) .btn-row-restore:hover{
            background:rgba(39,174,96,0.2);
        }
        html[data-theme]:not([data-theme="coffee"]) .btn-row-delete{
            background:rgba(195,7,63,0.14);
            color:#ff627f;
        }
        html[data-theme]:not([data-theme="coffee"]) .btn-row-delete:hover{
            background:rgba(195,7,63,0.22);
        }
    </style>
</head>
<body>
    <header class="main-header">
        <a href="main.html" class="brand-block">
            <img src="assets/images/branding/Logo.svg" alt="Logo" class="header-logo">
            <div class="brand-text-wrap">
                <div class="brand-name">SCANLATE<br>PROJECT<br>TRACKER</div>
                <span class="brand-beta">Beta</span>
            </div>
        </a>
        <nav class="header-nav">
            <a href="main.html" class="nav-link"><i class="fas fa-home"></i> ГОЛОВНА</a>
            <a href="calendar.html" class="nav-link"><i class="fas fa-calendar-alt"></i> КАЛЕНДАР</a>
            <a href="archive.html" class="nav-link active"><i class="fas fa-archive"></i> АРХІВ</a>
            <a href="add.html" class="nav-link"><i class="fas fa-plus-circle"></i> ДОДАТИ</a>
        </nav>
        <div class="user-actions">
            <a href="profile.html" class="user-pill">
                <img src="assets/images/avatars/avatar-default.svg" alt="User" class="user-avatar" id="user-avatar">
                <span id="user-name">...</span>
            </a>
            <a href="#" class="logout-link">ВИЙТИ</a>
        </div>
        <button class="burger-btn" id="burger-btn"><span></span><span></span><span></span></button>
        <nav class="mobile-nav" id="mobile-nav">
            <a href="main.html" class="nav-link"><i class="fas fa-home"></i> ГОЛОВНА</a>
            <a href="calendar.html" class="nav-link"><i class="fas fa-calendar-alt"></i> КАЛЕНДАР</a>
            <a href="archive.html" class="nav-link active"><i class="fas fa-archive"></i> АРХІВ</a>
            <a href="add.html" class="nav-link"><i class="fas fa-plus-circle"></i> ДОДАТИ</a>
            <div class="mobile-nav-divider"></div>
            <div class="mobile-user-row">
                <a href="profile.html" class="mobile-user-pill">
                    <img src="assets/images/avatars/avatar-default.svg" class="user-avatar" id="user-avatar-mobile" style="width:32px;height:32px;">
                    <span id="user-name-mobile">...</span>
                </a>
                <a href="#" class="logout-link">ВИЙТИ</a>
            </div>
        </nav>
    </header>
    <main class="container">
        <div class="flat-card" style="overflow:visible;">
            <div class="archive-toolbar">
                <div style="display:flex;align-items:center;gap:14px;">
                    <h3 style="margin:0;"><i class="fas fa-archive"></i> Завершені задачі</h3>
                    <span class="archive-count" id="archive-count"></span>
                </div>
                <div class="archive-actions">
                    <div class="export-group">
                        <i class="fas fa-filter" style="color:#b1a191;font-size:11px;"></i>
                        <select id="export-team-filter"><option value="all">Усі команди</option></select>
                        <button class="btn-export" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Експорт .xlsx</button>
                    </div>
                    <button class="btn-delete-selected" id="btn-delete-selected"><i class="fas fa-trash"></i> Видалити вибрані</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table style="min-width:760px;">
                    <thead>
                        <tr>
                            <th style="width:38px;"><input type="checkbox" id="check-all" class="row-select"></th>
                            <th>КОМАНДА</th><th>ПРОЄКТ</th><th>ЗАДАЧА</th>
                            <th>№</th><th>ДАТА АРХІВУ</th><th>ЦІНА</th>
                            <th>ОПЛАТА</th><th style="width:96px;"></th>
                        </tr>
                    </thead>
                    <tbody id="archive-list">
                        <tr><td colspan="9" style="text-align:center;color:#b1a191;padding:30px;font-weight:700;"><i class="fas fa-spinner fa-spin"></i> Завантаження...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script type="module" src="assets/js/shared/header.js"></script>
    <script type="module" src="assets/js/app/archive-script.js"></script>
    <script src="assets/js/shared/footer.js"></script>
</body>
</html>
